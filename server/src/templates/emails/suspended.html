<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Suspended</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; }
        .warning { background: #fef3c7; color: #92400e; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .cta { display: inline-block; background: #8B5ADF; color: #fff; padding: 14px 28px; text-decoration: none; border-radius: 8px; margin-top: 20px; }
        .footer { text-align: center; margin-top: 24px; color: #6b7280; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>تم تعليق اشتراكك | Subscription Suspended</h1>
        <p>عزيزي {{tenantNameAr}} | Dear {{tenantName}},</p>
        <div class="warning">
            <p style="margin:0;">تم تعليق اشتراكك بسبب عدم استلام الدفع في الموعد المحدد.</p>
            <p style="margin:10px 0 0;">Your subscription has been suspended due to non-payment. Please pay to restore access.</p>
            <p style="margin:10px 0 0;">Bill: {{billNumber}}</p>
        </div>
        <p><a href="{{paymentUrl}}" class="cta">الفواتير | My Bills</a></p>
        <div class="footer"><p>Rifah Platform</p></div>
    </div>
</body>
</html>
