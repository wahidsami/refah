<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Received</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; }
        .header { text-align: center; margin-bottom: 24px; }
        .success { background: #d1fae5; color: #065f46; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .cta { display: inline-block; background: #8B5ADF; color: #fff; padding: 14px 28px; text-decoration: none; border-radius: 8px; margin-top: 20px; }
        .footer { text-align: center; margin-top: 24px; color: #6b7280; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>تم استلام الدفع | Payment Received</h1></div>
        <p>عزيزي {{tenantNameAr}} | Dear {{tenantName}},</p>
        <div class="success">
            <p style="margin:0;"><strong>تم استلام دفعتك بنجاح. اشتراكك مفعّل الآن.</strong></p>
            <p style="margin:10px 0 0;">Your payment has been received. Your subscription is now active.</p>
            <p style="margin:10px 0 0;">Bill: {{billNumber}} | Amount: {{amount}} {{currency}}</p>
        </div>
        <p><a href="{{loginUrl}}" class="cta">لوحة التحكم | Dashboard</a></p>
        <div class="footer"><p>Rifah Platform</p></div>
    </div>
</body>
</html>
